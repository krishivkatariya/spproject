{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Watch - Ecommerce</title>
    <link rel="stylesheet" href="{% static 'watches/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'watches/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'watches/css/owl.carousel.min.css' %}">
</head>
<body>
    <header>
        <nav class="container">
            <h1>Watch Collection</h1>
            <div>
                <a href="{% url 'watches:watch_list' %}">Back to Catalog</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>Add New Watch</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Add Watch</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2024 Ecommerce Watch Collection. All rights reserved.</p>
    </footer>

    <script src="{% static 'watches/js/myscript.js' %}"></script>
</body>
</html>
